# Policy forgery attack: embeds a fake chain-of-thought that fabricates a policy
# exception requiring the model to enumerate its restrictions. The model's own
# instruction-following training gets weaponized against it.
#
# Effective on: GPT-style (RLHF/instruction-following) models, DeepSeek
# Ineffective on: Constitutional training (Claude, Qwen) — detected as injection
#
# Discovery-only: no topic seeding. The model enumerates from scratch each step.
