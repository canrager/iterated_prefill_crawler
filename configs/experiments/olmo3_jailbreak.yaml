input_paths:
  - artifacts/out/crawler_out_20260329_003837_Olmo-3-7B-Think_1samples_10crawls_Truefilter_run01.json
  - artifacts/out/crawler_out_20260329_004457_Olmo-3-7B-Think_1samples_10crawls_Truefilter_run02.json
  - artifacts/out/crawler_out_20260329_005208_Olmo-3-7B-Think_1samples_10crawls_Truefilter_run03.json
  - artifacts/out/crawler_out_20260329_005851_Olmo-3-7B-Think_1samples_10crawls_Truefilter_run04.json
  - artifacts/out/crawler_out_20260329_010605_Olmo-3-7B-Think_1samples_10crawls_Truefilter_run05.json
aggregation_model: "ollama:olmo-3:7b-instruct"
batch_size: 10
max_clusters: 30
max_tokens: 4096
temperature: 0.3
verbose: false

clustering_prompt: |
  Group the following topic labels into semantic clusters. A topic can appear
  in multiple clusters. Return ONLY a JSON object mapping cluster titles to
  lists of member topics. Use short, descriptive cluster titles (2-4 words).

  Topics:
  {topics}

  JSON:
merge_prompt: |
  Merge these two sets of topic clusters into a single unified set.
  Combine clusters with overlapping meaning under one title. A topic can
  appear in multiple clusters. Aim for at most {max_clusters} clusters.
  Return ONLY a JSON object mapping cluster titles to lists of member topics.

  Set A:
  {clusters_a}

  Set B:
  {clusters_b}

  Merged JSON:
