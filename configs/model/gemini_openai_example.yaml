# Gemini for topic generation, OpenAI for evaluation
#
# Uses Google's Gemini API (OpenAI-compatible endpoint) for the target model
# and OpenAI for auxiliary roles.
#
# Prerequisites:
#   - GEMINI_API_KEY set (get one at https://aistudio.google.com/apikey)
#   - OPENAI_API_KEY set
#
# Usage:
#   ./scripts/run.sh model=gemini_openai_example crawler=default

default_provider: "openrouter"

# Topic generation via Gemini
target_model: "gemini:gemini-2.0-flash"

# Auxiliary roles via OpenAI
translation_model: "openai:gpt-4o-mini"
summarization_model: "openai:gpt-4o-mini"
refusal_check_model: "openai:gpt-4o-mini"
refusal_classifier_model: "ProtectAI/distilroberta-base-rejection-v1"

# No local GPU needed
local_model: null
device: "cpu"
cache_dir: "hf_models"
vllm_tensor_parallel_size: 1
vllm_gpu_memory_utilization: 0.8
vllm_max_model_len: 4096
