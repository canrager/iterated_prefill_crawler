# Model selection ("local" or openrouter path)
target_model: "local"
translation_model: "ollama:olmo-3:7b-instruct"
summarization_model: "ollama:olmo-3:7b-instruct"
refusal_check_model: "ollama:olmo-3:7b-instruct"
refusal_classifier_model: "ProtectAI/distilroberta-base-rejection-v1"

# Local model config (needed to fulfill OmegaConf typecheck)
local_model: "Qwen/Qwen3-8B" # null to skip loading
quantization_bits: null # null for no quantization
device: "auto"
cache_dir: "hf_models"
vllm_tensor_parallel_size: 1
vllm_gpu_memory_utilization: 0.5
vllm_max_model_len: 2048
